<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>コンカフェおじさん落ちものパズル</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="startScreen" class="start-screen" aria-label="タイトル画面">
        <div class="start-card">
          <div class="start-deco" aria-hidden="true">
            <span class="star star-a">★</span>
            <span class="star star-b">♡</span>
            <span class="star star-c">★</span>
            <span class="star star-d">♡</span>
          </div>
          <p class="start-badge">コンカフェ</p>
          <div class="title-stage">
            <img class="start-oji start-oji-futoi" src="assets/ojisan/futoi.png" alt="">
            <img class="start-oji start-oji-usui" src="assets/ojisan/usui.png" alt="">
            <img class="start-oji start-oji-vip" src="assets/ojisan/vip.png" alt="">
            <img class="start-oji start-oji-claimer" src="assets/ojisan/claimer.png" alt="">
            <img class="start-oji start-oji-shy" src="assets/ojisan/shy.png" alt="">
            <img class="start-oji start-oji-festival" src="assets/ojisan/festival.png" alt="">
            <h1><span class="title-main">おじさん</span><span class="title-sub">ポイポイ！</span></h1>
          </div>
          <div class="difficulty-picker" aria-label="難易度">
            <button class="difficulty-button active" type="button" data-difficulty="easy">かんたん</button>
            <button class="difficulty-button" type="button" data-difficulty="normal">ふつう</button>
            <button class="difficulty-button" type="button" data-difficulty="hard">むずかしい</button>
          </div>
          <button id="startButton" class="start-button" type="button">営業開始</button>
          <div class="start-casts" aria-hidden="true">
            <img src="assets/casts/miju.png" alt="">
            <img src="assets/casts/chaki.png" alt="">
            <img src="assets/casts/nano.png" alt="">
            <img src="assets/casts/izumo.png" alt="">
            <img src="assets/casts/yume.png" alt="">
          </div>
        </div>
      </section>

      <section id="gamePanel" class="game-panel" aria-label="コンカフェおじさん落ちものパズル" hidden>
        <div id="tutorial" class="tutorial" aria-hidden="true">
          <strong>3つ並べて育てろ！</strong>
          <span>神客でフィーバー突入</span>
        </div>
        <button id="restartButton" class="restart-button" type="button" aria-label="リセット" title="リセット">リセット</button>

        <div class="hud" aria-label="シフト状況">
          <div class="meter-block">
            <div class="meter-label">
              <span>空気</span>
              <strong id="ambientValue">70</strong>
              <em>猶予UP / 会計ボーナス</em>
            </div>
            <div class="meter-track" aria-hidden="true">
              <div id="ambientFill" class="meter-fill"></div>
            </div>
          </div>
          <div class="stat">
            <span>売上</span>
            <strong id="scoreValue">0</strong>
            <em id="bestValue">ベスト ¥0</em>
          </div>
          <div class="stat">
            <span>残り時間</span>
            <strong id="timeValue">1:30</strong>
            <div class="mini-track" aria-hidden="true"><i id="timeFill"></i></div>
          </div>
          <div class="stat">
            <span>クレーム</span>
            <strong id="complaintValue">0/5</strong>
            <em id="complaintWarning" class="danger-copy">あと5でGAME OVER</em>
          </div>
        </div>

        <div class="queue-row" aria-label="来店キュー">
          <div class="queue-card queue-card-current">
            <span>来店中</span>
            <div id="currentGuest" class="guest-chip"></div>
            <div class="drop-track" aria-hidden="true"><div id="dropFill"></div></div>
          </div>
          <div class="queue-card compact">
            <span>次</span>
            <div id="nextGuest" class="guest-chip small"></div>
          </div>
          <div id="message" class="message">3つ並べて進化！</div>
        </div>

        <div class="evolution-bar" aria-label="進化ルート">
          <span>薄客</span>
          <i>→</i>
          <span>常連</span>
          <i>→</i>
          <span>太客</span>
          <i>→</i>
          <span>VIP</span>
          <i>→</i>
          <strong>神客</strong>
        </div>

        <div class="playfield">
          <div class="field-sign">
            <span>FLOOR</span>
            <span>3つで進化</span>
          </div>
          <div id="board" class="board" aria-label="パズル盤面"></div>
          <div id="casts" class="casts" aria-label="キャスト"></div>
        </div>
        <div id="floatLayer" class="float-layer" aria-hidden="true"></div>

        <div class="controls">
          <button id="leftButton" type="button" aria-label="ひだり">ひだり</button>
          <button id="dropButton" type="button"><strong>おとす</strong></button>
          <button id="rightButton" type="button" aria-label="みぎ">みぎ</button>
        </div>
      </section>
    </main>

    <div id="gameOver" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <div class="result">
        <p class="eyebrow">CLOSE</p>
        <h2 id="resultTitle">本日の営業終了</h2>
        <p id="resultReason" class="result-reason"></p>
        <p id="resultCopy"></p>
        <div class="result-grid">
          <div><span>売上</span><strong id="finalScore">0</strong></div>
          <div><span>空気</span><strong id="finalAmbient">0</strong></div>
          <div><span>最高連鎖</span><strong id="finalChain">0</strong></div>
          <div><span>進化数</span><strong id="finalMerges">0</strong></div>
        </div>
        <p id="finalHint" class="result-hint"></p>
        <button id="shareButton" class="share-button" type="button">結果をシェア</button>
        <button id="againButton" type="button">もう1シフト</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
